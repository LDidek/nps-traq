[build]
  publish = "."

[dev]
  publish = "."
  port = 8888
  framework = "#static"
  autoLaunch = false

# CDN de imagens (aceita qualquer URL externa)
[images]
  remote_images = ["https://.*"]

# Redirect da home para a pagina principal
# Adicionado automaticamente por /gerar-copy ao criar a primeira pagina
[[redirects]]
  from = "/"
  to = "/nps-traq/"
  status = 302
  force = true

# Página de Obrigado na Raíz
[[redirects]]
  from = "/obrigado"
  to = "/nps-traq/obrigado.html"
  status = 200

# NPS - Links camuflados diretos na raiz (ex: nps.traq.com.br/empresa-alpha)
[[redirects]]
  from = "/:cliente"
  to = "/nps-traq/?cliente=:cliente"
  status = 200

# NPS - Links camuflados (URL limpa para o cliente)
# Sem force: Netlify serve arquivos reais primeiro (CSS, JS, HTML)
# So aplica rewrite quando o arquivo nao existe (ex: /nps-traq/traq)
[[redirects]]
  from = "/nps-traq/:cliente"
  to = "/nps-traq/?cliente=:cliente"
  status = 200

# Redirect www → apex
[[redirects]]
  from = "https://www.example.com/*"
  to = "https://example.com/:splat"
  status = 301
  force = true

# Headers de seguranca
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets de fontes e imagens locais apenas
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
